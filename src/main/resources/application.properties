spring.application.name=ExamService
server.port=${EXAMSERVICE_SERVER_PORT:8080}
server.servlet.context-path=/

spring.datasource.url=${EXAMSERVICE_DB_URL:jdbc:mysql://localhost:3306/exam_service}
spring.datasource.username=${EXAMSERVICE_DB_USERNAME:root}
spring.datasource.password=${EXAMSERVICE_DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${EXAMSERVICE_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${EXAMSERVICE_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

examservice.jwt.base64-secret=${EXAMSERVICE_JWT_BASE64_SECRET:QmFzZTY0U2VjcmV0S2V5Rm9yRXhhbVNlcnZpY2VUb0JlUmVwbGFjZWRJblByb2R1Y3Rpb24xMjM0NTY3ODkw}

management.endpoints.web.exposure.include=health,info
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

logging.level.root=INFO
logging.level.com.DoAn1.examservice=DEBUG

examservice.attempt.auto-submit.fixed-delay-ms=${EXAMSERVICE_ATTEMPT_AUTO_SUBMIT_DELAY_MS:30000}

